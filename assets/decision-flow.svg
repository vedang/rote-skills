<svg xmlns="http://www.w3.org/2000/svg" width="960" height="1210" viewBox="0 0 960 1210" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c0c0e"/>
      <stop offset="1" stop-color="#08080a"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b6b73"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e8833a"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="960" height="1210" fill="url(#bg)"/>

  <!-- title -->
  <text x="48" y="58" fill="#f4f4f5" font-size="26" font-weight="700">rote-setup</text>
  <text x="48" y="84" fill="#8a8a92" font-size="14">the agent onboards itself — one decision at a time</text>
  <text x="48" y="103" fill="#e8833a" font-size="13" font-weight="600" letter-spacing="1.5">DECISION FLOW</text>

  <!-- ================= entry ================= -->
  <text x="480" y="146" fill="#e8833a" font-size="16" font-weight="700" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">/rote-setup<tspan fill="#6b6b73"> · </tspan>$rote-setup</text>
  <text x="480" y="166" fill="#7c7c84" font-size="11" text-anchor="middle">Claude Code · Codex</text>
  <line x1="480" y1="176" x2="480" y2="194" stroke="#6b6b73" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- install gate -->
  <g filter="url(#soft)">
    <rect x="330" y="196" width="300" height="70" rx="12" fill="#15151a" stroke="#2c2c34" stroke-width="1.5"/>
  </g>
  <text x="480" y="226" fill="#f4f4f5" font-size="15" font-weight="600" text-anchor="middle">rote binary installed?</text>
  <text x="480" y="248" fill="#7c7c84" font-size="12.5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">command -v rote</text>

  <!-- no / yes split -->
  <path d="M420,266 L420,300 L300,300 L300,330" fill="none" stroke="#6b6b73" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M540,266 L540,560" fill="none" stroke="#6b6b73" stroke-width="2" stroke-dasharray="2 4"/>
  <text x="385" y="296" fill="#9a9aa2" font-size="12.5" text-anchor="end">no</text>
  <text x="560" y="296" fill="#9a9aa2" font-size="12.5">yes</text>

  <!-- how to install -->
  <g filter="url(#soft)">
    <rect x="120" y="332" width="300" height="172" rx="12" fill="#15151a" stroke="#2c2c34" stroke-width="1.5"/>
  </g>
  <text x="140" y="360" fill="#f4f4f5" font-size="14.5" font-weight="600">How to install?</text>
  <line x1="120" y1="374" x2="420" y2="374" stroke="#26262d" stroke-width="1"/>
  <text x="142" y="400" fill="#c8c8d0" font-size="13"><tspan fill="#e8833a">●</tspan>  CLI one-liner <tspan fill="#6b6b73" font-size="11">(curl … | bash)</tspan></text>
  <text x="142" y="430" fill="#c8c8d0" font-size="13"><tspan fill="#e8833a">●</tspan>  Editor extension</text>
  <text x="158" y="450" fill="#7c7c84" font-size="11.5">VS Code · Cursor · Antigravity</text>
  <text x="142" y="480" fill="#c8c8d0" font-size="13"><tspan fill="#e8833a">●</tspan>  I'll do it myself</text>

  <!-- merge to sign-in -->
  <path d="M270,504 L270,536 L480,536 L480,560" fill="none" stroke="#6b6b73" stroke-width="2"/>
  <line x1="480" y1="556" x2="480" y2="586" stroke="#6b6b73" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ================= sign in (identity gate) ================= -->
  <g filter="url(#soft)">
    <rect x="300" y="590" width="360" height="200" rx="14" fill="#1a130c" stroke="#e8833a" stroke-width="2"/>
  </g>
  <rect x="300" y="590" width="6" height="200" rx="3" fill="#e8833a"/>
  <text x="330" y="624" fill="#ffb878" font-size="11" font-weight="700" letter-spacing="1.5">IDENTITY GATE · ALWAYS RUNS</text>
  <text x="330" y="652" fill="#f4f4f5" font-size="17" font-weight="700">Sign in <tspan fill="#9a8a78" font-size="13" font-weight="500">(mandatory)</tspan></text>
  <text x="330" y="674" fill="#b8a890" font-size="12.5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">rote whoami → rote login</text>
  <line x1="324" y1="690" x2="636" y2="690" stroke="#3a2c1c" stroke-width="1"/>
  <text x="330" y="716" fill="#d8d0c4" font-size="13">Have an account?</text>
  <text x="346" y="740" fill="#c8c8d0" font-size="12.5">→ yes  ·  Google / GitHub</text>
  <text x="346" y="760" fill="#c8c8d0" font-size="12.5">→ have an invite code  ·  rote join</text>
  <text x="346" y="780" fill="#c8c8d0" font-size="12.5">→ no account  ·  request access</text>

  <line x1="480" y1="790" x2="480" y2="822" stroke="#e8833a" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="500" y="814" fill="#8a8a92" font-size="12" font-style="italic">signed in as you@…</text>

  <!-- ================= fork ================= -->
  <g filter="url(#soft)">
    <rect x="350" y="828" width="260" height="58" rx="12" fill="#15151a" stroke="#2c2c34" stroke-width="1.5"/>
  </g>
  <text x="480" y="863" fill="#f4f4f5" font-size="15" font-weight="600" text-anchor="middle">How far do you want to go?</text>

  <!-- three lanes -->
  <path d="M480,886 L480,908 M150,908 L810,908 M150,908 L150,930 M480,908 L480,930 M810,908 L810,930"
        fill="none" stroke="#6b6b73" stroke-width="2"/>
  <line x1="150" y1="926" x2="150" y2="946" stroke="#6b6b73" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="926" x2="480" y2="946" stroke="#6b6b73" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="810" y1="926" x2="810" y2="946" stroke="#6b6b73" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- lane A: just the CLI -->
  <g filter="url(#soft)">
    <rect x="48" y="950" width="204" height="92" rx="12" fill="#121216" stroke="#2c2c34" stroke-width="1.5"/>
  </g>
  <text x="150" y="978" fill="#f4f4f5" font-size="14" font-weight="600" text-anchor="middle">Just the CLI</text>
  <text x="150" y="998" fill="#7c7c84" font-size="12" text-anchor="middle">— stop here —</text>
  <line x1="68" y1="1010" x2="232" y2="1010" stroke="#26262d" stroke-width="1"/>
  <text x="150" y="1030" fill="#c8c8d0" font-size="12" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">rote how → done</text>

  <!-- lane B: powerpack -->
  <g filter="url(#soft)">
    <rect x="378" y="950" width="204" height="92" rx="12" fill="#121216" stroke="#2c2c34" stroke-width="1.5"/>
  </g>
  <text x="480" y="978" fill="#f4f4f5" font-size="14" font-weight="600" text-anchor="middle">Powerpack</text>
  <text x="480" y="998" fill="#7c7c84" font-size="12" text-anchor="middle">curated starter set</text>
  <line x1="398" y1="1010" x2="562" y2="1010" stroke="#26262d" stroke-width="1"/>
  <text x="480" y="1030" fill="#c8c8d0" font-size="11.5" text-anchor="middle">github · gmail · calendar · linear</text>

  <!-- lane C: catalog -->
  <g filter="url(#soft)">
    <rect x="708" y="950" width="204" height="92" rx="12" fill="#121216" stroke="#2c2c34" stroke-width="1.5"/>
  </g>
  <text x="810" y="978" fill="#f4f4f5" font-size="14" font-weight="600" text-anchor="middle">API catalog</text>
  <text x="810" y="998" fill="#7c7c84" font-size="12" text-anchor="middle">872 built-in specs</text>
  <line x1="728" y1="1010" x2="892" y2="1010" stroke="#26262d" stroke-width="1"/>
  <text x="810" y="1030" fill="#c8c8d0" font-size="11.5" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">search → info → new</text>

  <!-- lane A drops straight to done; B + C merge into menu -->
  <path d="M150,1042 L150,1150" fill="none" stroke="#6b6b73" stroke-width="2"/>
  <path d="M480,1042 L480,1066 M810,1042 L810,1066 M480,1066 L810,1066 M645,1066 L645,1090"
        fill="none" stroke="#6b6b73" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- menu + closer (compact, right) -->
  <g filter="url(#soft)">
    <rect x="500" y="1094" width="290" height="40" rx="10" fill="#15151a" stroke="#2c2c34" stroke-width="1.5"/>
  </g>
  <text x="645" y="1119" fill="#d8d8e0" font-size="12.5" text-anchor="middle">credentials · OAuth · install skill · explore</text>
  <line x1="645" y1="1134" x2="645" y2="1150" stroke="#6b6b73" stroke-width="2"/>

  <!-- done bar -->
  <path d="M150,1150 L398,1150" fill="none" stroke="#6b6b73" stroke-width="2"/>
  <path d="M398,1150 L398,1158" fill="none" stroke="#e8833a" stroke-width="2"/>
  <g filter="url(#soft)">
    <rect x="350" y="1158" width="96" height="34" rx="17" fill="#1a130c" stroke="#e8833a" stroke-width="1.5"/>
  </g>
  <text x="398" y="1180" fill="#ffb878" font-size="13.5" font-weight="700" text-anchor="middle">✦  done</text>

  <!-- legend -->
  <rect x="700" y="150" width="14" height="14" rx="3" fill="#1a130c" stroke="#e8833a" stroke-width="1.5"/>
  <text x="722" y="161" fill="#8a8a92" font-size="11.5">always runs (identity gate)</text>
  <rect x="700" y="172" width="14" height="14" rx="3" fill="#15151a" stroke="#2c2c34" stroke-width="1.5"/>
  <text x="722" y="183" fill="#8a8a92" font-size="11.5">a choice you make</text>
</svg>
